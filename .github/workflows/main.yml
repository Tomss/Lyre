# Nom du workflow qui apparaîtra dans l'onglet Actions
name: Build React App

# Déclenche ce workflow à chaque fois que vous poussez du code sur la branche 'main'
on:
  push:
    branches: [ "main" ]
  # Permet de lancer ce workflow manuellement depuis l'onglet Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # Utilise une machine virtuelle Ubuntu pour exécuter les commandes

    steps:
      # 1. Récupère votre code depuis le dépôt GitHub
      - name: Checkout code
        uses: actions/checkout@v4 # Petite mise à jour ici aussi

      # 2. Installe Node.js (version 18)
      - name: Setup Node.js
        uses: actions/setup-node@v4 # Et ici
        with:
          node-version: 18

      # 3. Installe les dépendances du projet (équivalent de 'npm install')
      - name: Install dependencies
        run: npm install

      # 4. Compile le projet (équivalent de 'npm run build')
      - name: Build project
        run: npm run build

      # 5. Met le dossier 'dist' compilé à disposition pour le téléchargement
      - name: Upload build artifact
        uses: actions/upload-artifact@v4 # <-- LA CORRECTION PRINCIPALE EST ICI
        with:
          name: production-files # Nom du fichier que vous allez télécharger
          path: ./dist
